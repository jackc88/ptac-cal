name: Update PTAC Calendars

on:
  schedule:
    - cron: '0 21 * * *'     # Runs daily at 5:00 AM UTC
  workflow_dispatch:        # Allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Generate calendars
        run: python ptac_generator.py --with-addresses

      - name: Commit updated calendars
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update PTAC calendars - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
